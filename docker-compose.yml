services:
  api:
    build:
      context: .
      dockerfile: backend/Dockerfile
    ports: ["8000:8000"]
    environment:
      DATABASE_URL: sqlite:////data/careflow.db
      USE_MOCK_AI: "true"
    volumes: ["careflow-data:/data"]
  web:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    ports: ["3000:3000"]
    environment:
      NEXT_PUBLIC_API_URL: http://localhost:8000
    depends_on: [api]
volumes:
  careflow-data:
