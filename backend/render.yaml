services:
  - type: web
    name: careflow-api
    runtime: python
    rootDir: backend
    buildCommand: pip install uv && uv sync --frozen --no-dev
    startCommand: uv run uvicorn app.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: USE_MOCK_AI
        value: true
      - key: PYTHON_VERSION
        value: 3.12.8
